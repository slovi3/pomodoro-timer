<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <header class="topbar">
    <div class="clock-wrap">
      <span id="clock">00:00:00</span>
    </div>

    <button id="themeToggle" class="theme-btn" type="button">🌙</button>
  </header>

  <main class="app">
    <p class="subtitle">You're building tomorrow, start today</p>

    <section class="timer-stage">
      <div class="timer-glow"></div>
      <h1 id="timer" class="timer">25:00</h1>
    </section>

    <section class="controls">
      <button id="startBtn" class="btn btn-primary" type="button">Start</button>
      <button id="pauseBtn" class="btn" type="button">Pause</button>
      <button id="resetBtn" class="btn" type="button">Reset</button>
    </section>

    <section class="meta">
  <div class="pill">Focus 25</div>
  <div class="pill">Minimal Mode</div>
  <div class="pill" id="sessionCount">Sessions today: 0</div>
</section>
  </main>

  <div class="bottom-note">stay focused ✦</div>

  <script src="app.js"></script>
</body>
</html>
